<div class="dialog-container">
  <div class="dialog-icon-header">
    <div class="icon-circle">
      <mat-icon class="warning-icon">warning</mat-icon>
    </div>
  </div>

  <h2 mat-dialog-title class="dialog-title">Confirmar exclusão</h2>

  <mat-dialog-content class="dialog-content">
    <p class="message-text">
      Tem certeza de que deseja excluir <strong class="highlight-text">{{ data.dado }}</strong>?
    </p>
    <div class="warning-box">
      <mat-icon class="info-icon">info</mat-icon>
      <span>Esta ação não pode ser desfeita</span>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions class="dialog-actions">
    <button mat-stroked-button (click)="cancelar()" class="cancel-btn">
      Cancelar
    </button>
    <button mat-raised-button color="warn" (click)="confirmar()" class="delete-btn">
      <mat-icon class="btn-icon">delete</mat-icon>
      Excluir
    </button>
  </mat-dialog-actions>
</div>
