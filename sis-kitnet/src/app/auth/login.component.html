<div class="container" style="max-width: 400px; margin: auto">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" autocomplete="off">
    <mat-card>
      <mat-card-header>
        <mat-card-title>Login</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>E-mail</mat-label>
          <input matInput type="email" formControlName="email" required autocomplete="username" />
          <mat-error *ngIf="form.get('email')?.hasError('required')">E-mail é obrigatório</mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">E-mail inválido</mat-error>
        </mat-form-field>
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Senha</mat-label>
          <input matInput type="password" formControlName="senha" required autocomplete="current-password" />
          <mat-error *ngIf="form.get('senha')?.hasError('required')">Senha é obrigatória</mat-error>
        </mat-form-field>
        <div *ngIf="error" class="error-message">{{ error }}</div>
      </mat-card-content>
      <mat-card-actions>
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || loading">
          Entrar
        </button>
      </mat-card-actions>
    </mat-card>
  </form>
</div>
