<!-- listar-inquilino.component.html -->
<div class="table-responsive-mobile">
  <h1 class="mb-3">Listar Inquilinos</h1>
  
  <!-- Header com botão Novo -->
  <div class="card shadow-sm p-4 mb-4">
    <mat-toolbar class="btn-blue mb-0">
      <span class="flex-spacer"></span>
      <div class="d-flex justify-content-end w-100">
        <button mat-raised-button color="accent" routerLink="/inquilino">Novo</button>
      </div>
    </mat-toolbar>
  </div>

  <!-- Filtros -->
  <div class="card shadow-sm p-4 mb-4">
    <h3 class="mb-3">Filtros</h3>
    
    <div class="filters-grid">
        <div class="filter-item">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Filtrar por Nome</mat-label>
            <input matInput (input)="filtrarNome(getNomeInput($event))">
          </mat-form-field>
        </div>

        <div class="filter-item">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Filtrar por CPF</mat-label>
            <input matInput (input)="filtrarCpf(getCpfInput($event))">
          </mat-form-field>
        </div>

        <div class="filter-item">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Filtrar por Status</mat-label>
            <mat-select (selectionChange)="filtrarStatus($event.value)">
              <mat-option value="">Todos</mat-option>
              <mat-option *ngFor="let status of statusOptions" [value]="status">{{ status }}</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
      </div>
  </div>

  <!-- Tabela de Inquilinos -->
  <div class="card shadow-sm p-4">
    <div class="table-scroll">
      <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z1 w-100 modern-table">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Cód.</th>
        <td mat-cell *matCellDef="let item">{{ item.id }}</td>
      </ng-container>

      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Nome</th>
        <td mat-cell *matCellDef="let item">{{ item.nome }}</td>
      </ng-container>

      <ng-container matColumnDef="nomeAbreviado">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Nome Abreviado</th>
        <td mat-cell *matCellDef="let item">{{ item.nomeAbreviado }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
        <td mat-cell *matCellDef="let item">{{ item.email }}</td>
      </ng-container>

      <ng-container matColumnDef="cpf">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>CPF</th>
        <td mat-cell *matCellDef="let item">{{ item.cpf }}</td>
      </ng-container>

      <ng-container matColumnDef="rg">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>RG</th>
        <td mat-cell *matCellDef="let item">{{ item.rg }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
        <td mat-cell *matCellDef="let item">
          <span class="badge" [ngClass]="obterClasseStatusBadge(item.status)">
            {{ item.status }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let item" class="acoes-cell">
          <button mat-icon-button class="actions-trigger" [matMenuTriggerFor]="menu" aria-label="Ações">
            <mat-icon>more_vert</mat-icon>
          </button>

          <mat-menu #menu="matMenu">
            <button mat-menu-item [routerLink]="['/inquilino', item.id]">
              <mat-icon>edit</mat-icon>
              <span>Editar</span>
            </button>

            <button mat-menu-item (click)="excluir(item.id)">
              <mat-icon>delete</mat-icon>
              <span>Excluir</span>
            </button>
          </mat-menu>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>

    <div class="paginator-container">
    <mat-paginator
      [length]="totalRegistros()"
      [pageSize]="itensPorPagina()"
      [pageSizeOptions]="[5, 10, 20]"
      showFirstLastButtons>
    </mat-paginator>
    </div>

    <div class="mt-2">
      Página {{ paginaAtual() + 1 }}
    </div>

  </div>
</div>
