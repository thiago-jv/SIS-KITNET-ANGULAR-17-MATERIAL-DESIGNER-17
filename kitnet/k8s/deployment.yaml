# Recurso 1: Deployment
# Voces estao usando Deployment. Ele controla rollout, escala e versionamento.
# Ao aplicar este Deployment, o Kubernetes cria/gerencia automaticamente um ReplicaSet
# e os Pods. Entao voces usam Pod e ReplicaSet de forma indireta.
# Fluxo mental: Deployment -> ReplicaSet -> Pods.
apiVersion: apps/v1
kind: Deployment
metadata:
  # Nome unico do Deployment dentro do namespace.
  # Esse nome e usado nos comandos kubectl (ex.: rollout, scale, describe).
  name: sis-kitnet-backend
spec:
  # Quantidade de Pods desejada (escalabilidade horizontal).
  # Se um Pod cair, o Deployment recria para manter esse numero.
  # Em producao, aumentar para 3+ garante always-on durante updates.
  replicas: 3
  
  # Estrategia de RollingUpdate para zero-downtime deployment.
  # Evita derrubar todos os pods ao mesmo tempo.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Durante update, pode ter ate N+1 pods no total.
      # Isso significa 1 novo pod subindo enquanto 1 antigo ainda responde.
      maxSurge: 1
      # ZERO pods indisponivel de uma vez = zero downtime!
      # Kubernetes só mata um pod quando o novo está Ready.
      maxUnavailable: 0
  
  selector:
    matchLabels:
      # O Deployment so gerencia Pods que tenham exatamente este label.
      # Importante: este valor precisa combinar com template.metadata.labels.
      app: sis-kitnet-backend
  template:
    metadata:
      labels:
        # Label aplicado em cada Pod novo criado pelo Deployment.
        # O Service usa esse label para descobrir os Pods alvo.
        app: sis-kitnet-backend
    spec:
      containers:
        # Aqui comeca a definicao do container da aplicacao.
        - # Nome logico do container dentro do Pod
          name: sis-kitnet-backend
          # Imagem do container no registry.
          # Em CI/CD, a pipeline pode sobrescrever essa tag para BUILD_ID.
          image: docjv/sis_kitnet_backend:{{TAG}}
          # Always garante sempre fazer pull da imagem (importante para :latest tag).
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          env:
            # Perfil Spring em modo producao.
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            # URL do banco vem do Secret para evitar host fixo no manifesto.
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: sis-kitnet-backend-secret
                  key: SPRING_DATASOURCE_URL
            # As proximas variaveis vem de Secret no cluster (sem hardcode no YAML).
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sis-kitnet-backend-secret
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sis-kitnet-backend-secret
                  key: SPRING_DATASOURCE_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sis-kitnet-backend-secret
                  key: JWT_SECRET
          ports:
            - # Porta onde a aplicacao escuta dentro do container.
              # Nao e porta publica externa, e apenas interna ao Pod.
              name: http
              containerPort: 8089
              protocol: TCP

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8089
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 18
            timeoutSeconds: 3
          
          # ReadinessProbe: Kubernetes APENAS envia trafego quando a app está ready.
          # Se falhar, o Pod fica "NotReady" e o trafego é desviado para outros Pods.
          # Essencial para zero-downtime: novo Pod só recebe trafego quando server.
          readinessProbe:
            httpGet:
              # Usa o endpoint /actuator/health que agora é publico (sem autenticacao).
              path: /actuator/health
              port: 8089
            # Aguarda 30s antes de fazer o primeiro check (app startup leva tempo).
            initialDelaySeconds: 30
            # Verifica a cada 5s se ainda está ready.
            periodSeconds: 5
            # Se 3 checks falharem seguidos, marca como NotReady.
            failureThreshold: 3
            timeoutSeconds: 3
          
          # LivenessProbe: Detecta se a app está viva (não travada, locked, etc).
          # Se falhar, Kubernetes automaticamente mata e recria o Pod.
          # Diferente de readinessProbe que só remove trafego.
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8089
            # Começa check mais tarde que readiness (app já deve estar estável).
            initialDelaySeconds: 40
            # Verifica a cada 10s.
            periodSeconds: 10
            # Se 3 checks falharem, mata o Pod.
            failureThreshold: 3
            timeoutSeconds: 3
          
          # Lifecycle hooks: ações do Kubernetes durante startup/shutdown do Pod.
          lifecycle:
            # preStop: executado ANTES de matar o Pod (durante RollingUpdate).
            # Serve pra drena conexões gracefully.
            # `sleep 15` da 15 segundos pro Pod terminar requests antes de morrer.
            # Assim clientes não perdem conexões abruptamente.
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
