spring.datasource.url=jdbc:postgresql://localhost:5432/bdkitnet
spring.datasource.username=admin
spring.datasource.password=admin

server.port=8089
spring.jpa.show-sql=true
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults = false

# ==============================================================
# Pool de Conexões (Hikari)
# ==============================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# ==============================================================
# Otimização de Performance do Hibernate
# ==============================================================
# Batch processing
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true

# Second Level Cache (comentado - ativar quando adicionar Redis)
# spring.jpa.properties.hibernate.cache.use_second_level_cache=true
# spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.jcache.JCacheRegionFactory

# Query Cache
spring.jpa.properties.hibernate.cache.use_query_cache=false

# Estatísticas do Hibernate (DEV only - desabilitar em PROD)
spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.properties.hibernate.session.events.log=false

# Formatação de SQL (DEV only)
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Lazy loading optimization
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=false

# ==============================================================
# Logging de Performance
# ==============================================================
# Logs de queries lentas (> 1 segundo)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.stat=DEBUG

# Logs de pool de conexões
logging.level.com.zaxxer.hikari=DEBUG

spring.jackson.deserialization.fail-on-unknown-properties=true
spring.jackson.date-format=dd/MM/yyyy
spring.mvc.pathmatch.matching-strategy = ANT_PATH_MATCHER

# ==============================================================
# Actuator
# ==============================================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.metrics.enable.jvm=true
management.metrics.enable.hikaricp=true
management.metrics.enable.jdbc=true