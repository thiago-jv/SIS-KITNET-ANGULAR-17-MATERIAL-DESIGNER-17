services:
  db_kitnet:
    image: postgres:15
    container_name: kitnet-db
    restart: always
    environment:
      POSTGRES_DB: kitnet
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - rede-local

  db_sonar_kitnet:
    image: postgres:17
    container_name: lab-jenkins-postgresql
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: db_kitnet_sonar
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - rede-local

  sonarqube:
    image: sonarqube:9.0-community
    container_name: lab-jenkins-sonarqube
    ports:
      - "9000:9000"
    networks:
      - rede-local
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db_sonar_kitnet:5432/db_kitnet_sonar
      SONAR_JDBC_USERNAME: admin
      SONAR_JDBC_PASSWORD: admin
    depends_on:
      - db_sonar_kitnet
    volumes:
      - sonarqube_conf:/opt/sonarqube/conf
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_bundled-plugins:/opt/sonarqube/lib/bundled-plugins

volumes:
  db_data:
  pgdata:
  sonarqube_conf:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_bundled-plugins:

networks:
  rede-local:
    name: rede-local
    driver: bridge